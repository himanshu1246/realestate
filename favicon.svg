<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="featherGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2ecc71;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#3498db;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9b59b6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a017;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b8860b;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Navy background circle -->
  <circle cx="32" cy="32" r="32" fill="#0d1b3e"/>
  <!-- Peacock feather eye (small, top center) -->
  <ellipse cx="32" cy="14" rx="5" ry="6" fill="url(#featherGrad)" opacity="0.9"/>
  <ellipse cx="32" cy="14" rx="2.5" ry="3" fill="#0d1b3e"/>
  <ellipse cx="32" cy="14" rx="1.2" ry="1.5" fill="#3498db"/>
  <!-- Feather quill lines radiating -->
  <line x1="32" y1="14" x2="26" y2="8" stroke="#2ecc71" stroke-width="0.8" opacity="0.7"/>
  <line x1="32" y1="14" x2="30" y2="7" stroke="#3498db" stroke-width="0.8" opacity="0.7"/>
  <line x1="32" y1="14" x2="34" y2="7" stroke="#27ae60" stroke-width="0.8" opacity="0.7"/>
  <line x1="32" y1="14" x2="38" y2="8" stroke="#2ecc71" stroke-width="0.8" opacity="0.7"/>
  <!-- Large V letter in gold -->
  <text x="32" y="50" font-family="Georgia, serif" font-size="28" font-weight="700" fill="url(#goldGrad)" text-anchor="middle" font-style="italic">V</text>
  <!-- Thin gold underline -->
  <line x1="14" y1="54" x2="50" y2="54" stroke="#b8860b" stroke-width="1.2" opacity="0.6"/>
</svg>
